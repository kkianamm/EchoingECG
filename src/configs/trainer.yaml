accelerator: gpu
precision: bf16-mixed     # "bf16-mixed", "16-mixed", or "32-true"
deterministic: false       # reproducibility; sets torch.backends.cudnn.deterministic=True
benchmark: false          # keep false when deterministic=true
inference_mode: true
detect_anomaly: false     # set true for debugging NaNs (slows training)
max_steps: -1             # -1 = use max_epochs
accumulate_grad_batches: 1
gradient_clip_val: 1.0    # strong default; tune 0.5–1.0
gradient_clip_algorithm: norm  # "norm" (recommended) or "value"
log_every_n_steps: 50
enable_progress_bar: true
enable_model_summary: true

# Validation cadence
check_val_every_n_epoch: 1
val_check_interval: 1.0   # 1.0 = once per epoch; or a float <1 for fractional epoch

# Dataloaders
reload_dataloaders_every_n_epochs: 1
num_sanity_val_steps: 2   # quick sanity check at start of training